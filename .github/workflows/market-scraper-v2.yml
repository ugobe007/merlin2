# Market Data Scraper V2 - Direct PostgreSQL (No PostgREST cache issues)
name: Market Scraper V2

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Show commit info
        run: |
          echo "Commit: $(git rev-parse HEAD)"
          echo "Message: $(git log -1 --pretty=%B)"
          echo "Files changed:"
          git show --name-only --oneline HEAD | tail -n +2
      
      - name: Test PostgreSQL direct connection
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: npx tsx scripts/test-scraper-pg.ts
      
      - name: Run main scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/run-daily-scrape.ts
