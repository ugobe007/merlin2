# CI/CD Pipeline — Build, Typecheck, Deploy
# Runs on every push to main and on PRs targeting main
# Deploys to Fly.io only on main pushes (after checks pass)
#
# Required GitHub Secrets:
#   FLY_API_TOKEN — from `flyctl tokens create deploy`

name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 0: Verify required secrets are present ────────
  check-secrets:
    name: Verify Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          MISSING=""
          [ -z "$VITE_SUPABASE_URL" ]     && MISSING="$MISSING VITE_SUPABASE_URL"
          [ -z "$VITE_SUPABASE_ANON_KEY" ] && MISSING="$MISSING VITE_SUPABASE_ANON_KEY"
          [ -z "$FLY_API_TOKEN" ]          && MISSING="$MISSING FLY_API_TOKEN"
          if [ -n "$MISSING" ]; then
            echo "❌ Missing required GitHub Secrets:$MISSING"
            echo "   Add them at: github.com/ugobe007/merlin2/settings/secrets/actions"
            exit 1
          fi
          if echo "$VITE_SUPABASE_URL" | grep -q "placeholder"; then
            echo "❌ VITE_SUPABASE_URL contains 'placeholder' — check your secret value"
            exit 1
          fi
          echo "✅ All required secrets present"

  # ── Job 1: Typecheck + Build ──────────────────────────
  build:
    name: Typecheck & Build
    needs: check-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Production build
        run: npx vite build

  # ── Job 2: Deploy to Fly (main only) ─────────────────
  deploy:
    name: Deploy to Fly.io
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: '0.4.33'

      # IMPORTANT: The Dockerfile uses --mount=type=secret (not ARG) so all
      # VITE_ vars MUST be passed as --build-secret, not --build-arg.
      # Matching scripts/deploy.sh exactly.
      - name: Deploy
        run: |
          flyctl deploy -a merlin2 --remote-only --wait-timeout 300 \
            --build-arg "CACHEBUST=$(date +%s)" \
            --build-secret "VITE_SUPABASE_URL=${VITE_SUPABASE_URL}" \
            --build-secret "VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}" \
            --build-secret "VITE_OPENAI_API_KEY=${VITE_OPENAI_API_KEY}" \
            --build-secret "VITE_ENABLE_AI_ANALYSIS=${VITE_ENABLE_AI_ANALYSIS}" \
            --build-secret "VITE_GOOGLE_MAPS_API_KEY=${VITE_GOOGLE_MAPS_API_KEY}" \
            --build-secret "VITE_NREL_API_KEY=${VITE_NREL_API_KEY}" \
            --build-secret "VITE_VISUAL_CROSSING_API_KEY=${VITE_VISUAL_CROSSING_API_KEY}" \
            --build-secret "VITE_RESEND_API_KEY=${VITE_RESEND_API_KEY}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          VITE_ENABLE_AI_ANALYSIS: ${{ secrets.VITE_ENABLE_AI_ANALYSIS }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_NREL_API_KEY: ${{ secrets.VITE_NREL_API_KEY }}
          VITE_VISUAL_CROSSING_API_KEY: ${{ secrets.VITE_VISUAL_CROSSING_API_KEY }}
          VITE_RESEND_API_KEY: ${{ secrets.VITE_RESEND_API_KEY }}

      - name: Smoke test — verify site is up and Supabase URL is not placeholder
        run: |
          sleep 15
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" https://merlinenergy.net)
          if [ "$HTTP" != "200" ]; then
            echo "❌ Site returned HTTP $HTTP after deploy"
            exit 1
          fi
          echo "✅ Site returned HTTP 200"

          # Download the main JS bundle and check for placeholder URL
          BUNDLE_URL=$(curl -s https://merlinenergy.net | grep -o 'src="/assets/index[^"]*"' | head -1 | sed 's/src="//;s/"$//')
          if [ -n "$BUNDLE_URL" ]; then
            if curl -s "https://merlinenergy.net${BUNDLE_URL}" | grep -q "placeholder.supabase.co"; then
              echo "❌ BLACKOUT DETECTED: placeholder.supabase.co found in deployed bundle!"
              echo "   Build secrets were not injected. Check GitHub Secret values."
              exit 1
            fi
            echo "✅ No placeholder URL in bundle — Supabase credentials baked in correctly"
          else
            echo "⚠️  Could not find bundle URL to inspect — skipping bundle check"
          fi

          # Verify API is up
          API=$(curl -s https://merlinenergy.net/api/health | grep -o '"status":"ok"' || echo "")
          if [ -z "$API" ]; then
            echo "⚠️  API health check did not return ok (non-fatal)"
          else
            echo "✅ API health OK"
          fi
