<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merlin Wizard Screenshots - Partner Preview</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      overflow: hidden;
    }
    
    .header {
      position: absolute;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 100;
    }
    
    .header h1 {
      font-size: 1.5rem;
      color: #3ecf8e;
      margin-bottom: 0.25rem;
    }
    
    .header p {
      color: #888;
      font-size: 0.9rem;
    }
    
    /* Carousel Container */
    .carousel-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    /* Main Image Display */
    .carousel-main {
      position: relative;
      width: 100%;
      height: calc(100vh - 200px);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 80px;
    }
    
    .carousel-image {
      max-width: 90%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(62, 207, 142, 0.2);
    }
    
    /* Navigation Arrows */
    .carousel-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(62, 207, 142, 0.9);
      color: #0a0a0a;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 24px;
      font-weight: bold;
      transition: all 0.2s;
      z-index: 10;
    }
    
    .carousel-nav:hover {
      background: #3ecf8e;
      transform: translateY(-50%) scale(1.1);
    }
    
    .carousel-nav.prev {
      left: 2rem;
    }
    
    .carousel-nav.next {
      right: 2rem;
    }
    
    /* Info Panel */
    .carousel-info {
      position: absolute;
      bottom: 200px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(21, 21, 21, 0.95);
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1rem 2rem;
      max-width: 600px;
      text-align: center;
      backdrop-filter: blur(10px);
    }
    
    .step-badge {
      display: inline-block;
      background: #3ecf8e;
      color: #0a0a0a;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      margin-bottom: 0.5rem;
    }
    
    .carousel-info h3 {
      font-size: 1.2rem;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    
    .carousel-info p {
      font-size: 0.9rem;
      color: #888;
      line-height: 1.5;
    }
    
    /* Counter */
    .carousel-counter {
      position: absolute;
      top: 120px;
      right: 2rem;
      background: rgba(21, 21, 21, 0.9);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #888;
    }
    
    .carousel-counter span {
      color: #3ecf8e;
      font-weight: 600;
    }
    
    /* Thumbnail Strip */
    .thumbnail-strip {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #0a0a0a;
      border-top: 1px solid #2a2a2a;
      padding: 1rem;
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      justify-content: center;
    }
    
    .thumbnail {
      flex-shrink: 0;
      width: 120px;
      height: 80px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      object-fit: cover;
    }
    
    .thumbnail:hover {
      border-color: #3ecf8e;
      transform: translateY(-4px);
    }
    
    .thumbnail.active {
      border-color: #3ecf8e;
      box-shadow: 0 0 20px rgba(62, 207, 142, 0.5);
    }
    
    /* Auto-advance Toggle */
    .auto-toggle {
      position: absolute;
      top: 120px;
      left: 2rem;
      background: rgba(21, 21, 21, 0.9);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .auto-toggle:hover {
      background: rgba(62, 207, 142, 0.2);
    }
    
    .auto-toggle input {
      cursor: pointer;
    }
    
    .auto-toggle label {
      cursor: pointer;
      font-size: 0.9rem;
      color: #888;
    }
    
    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.2rem;
      }
      
      .carousel-nav {
        width: 50px;
        height: 50px;
        font-size: 20px;
      }
      
      .carousel-nav.prev {
        left: 1rem;
      }
      
      .carousel-nav.next {
        right: 1rem;
      }
      
      .carousel-info {
        max-width: 90%;
        padding: 1rem;
      }
      
      .carousel-counter,
      .auto-toggle {
        top: 80px;
        font-size: 0.8rem;
        padding: 0.4rem 0.8rem;
      }
      
      .thumbnail {
        width: 80px;
        height: 60px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧙‍♂️ Merlin Wizard Screenshots</h1>
    <p>Complete wizard flow from location entry to quote generation</p>
  </div>
  
  <!-- Carousel Container -->
  <div class="carousel-container">
    <!-- Counter -->
    <div class="carousel-counter">
      <span id="current-slide">1</span> / <span id="total-slides">4</span>
    </div>
    
    <!-- Auto-advance Toggle -->
    <div class="auto-toggle">
      <input type="checkbox" id="auto-advance" checked>
      <label for="auto-advance">Auto-advance (5s)</label>
    </div>
    
    <!-- Main Image Display -->
    <div class="carousel-main">
      <div class="carousel-nav prev" onclick="prevSlide()">‹</div>
      <img id="carousel-image" class="carousel-image" src="01-widget-demo-page.png" alt="Screenshot">
      <div class="carousel-nav next" onclick="nextSlide()">›</div>
    </div>
    
    <!-- Info Panel -->
    <div class="carousel-info" id="carousel-info">
      <span class="step-badge">LANDING PAGE</span>
      <h3>Widget Demo Page</h3>
      <p>Complete widget demo landing page with live calculator toggle, integration code snippets (iframe + REST API), and pricing tiers.</p>
    </div>
    
    <!-- Thumbnail Strip -->
    <div class="thumbnail-strip" id="thumbnail-strip">
      <img src="01-widget-demo-page.png" class="thumbnail active" onclick="goToSlide(0)" alt="Slide 1">
      <img src="02-wizard-step0-mode-selection.png" class="thumbnail" onclick="goToSlide(1)" alt="Slide 2">
      <img src="03-wizard-step1-location.png" class="thumbnail" onclick="goToSlide(2)" alt="Slide 3">
      <img src="04-wizard-step1-business-name.png" class="thumbnail" onclick="goToSlide(3)" alt="Slide 4">
    </div>
  </div>
  
  <script>
    const slides = [
      {
        image: '01-widget-demo-page.png',
        badge: 'LANDING PAGE',
        title: 'Widget Demo Page',
        description: 'Complete widget demo landing page with live calculator toggle, integration code snippets (iframe + REST API), and pricing tiers.'
      },
      {
        image: '02-wizard-step0-mode-selection.png',
        badge: 'STEP 0',
        title: 'Mode Selection',
        description: 'Choose between Guided Wizard (Free • AI-Powered), ProQuote™ (Advanced • Custom), or Upload Quote (Review • Enhance).'
      },
      {
        image: '03-wizard-step1-location.png',
        badge: 'STEP 1',
        title: 'Location Entry',
        description: 'ZIP code or country name input with US/International toggle. Merlin advisor explains utility rate lookup and solar scoring.'
      },
      {
        image: '04-wizard-step1-business-name.png',
        badge: 'STEP 1B',
        title: 'Business Matching',
        description: 'Optional business name input with auto-detection or skip to manual industry selection. Location confirmed with Edit option.'
      }
    ];
    
    let currentSlide = 0;
    let autoAdvanceInterval = null;
    
    function updateCarousel() {
      const slide = slides[currentSlide];
      
      // Update image
      document.getElementById('carousel-image').src = slide.image;
      
      // Update info
      const info = document.getElementById('carousel-info');
      info.innerHTML = `
        <span class="step-badge">${slide.badge}</span>
        <h3>${slide.title}</h3>
        <p>${slide.description}</p>
      `;
      
      // Update counter
      document.getElementById('current-slide').textContent = currentSlide + 1;
      document.getElementById('total-slides').textContent = slides.length;
      
      // Update thumbnails
      const thumbnails = document.querySelectorAll('.thumbnail');
      thumbnails.forEach((thumb, index) => {
        thumb.classList.toggle('active', index === currentSlide);
      });
    }
    
    function nextSlide() {
      currentSlide = (currentSlide + 1) % slides.length;
      updateCarousel();
    }
    
    function prevSlide() {
      currentSlide = (currentSlide - 1 + slides.length) % slides.length;
      updateCarousel();
    }
    
    function goToSlide(index) {
      currentSlide = index;
      updateCarousel();
    }
    
    // Auto-advance functionality
    function startAutoAdvance() {
      autoAdvanceInterval = setInterval(nextSlide, 5000);
    }
    
    function stopAutoAdvance() {
      if (autoAdvanceInterval) {
        clearInterval(autoAdvanceInterval);
        autoAdvanceInterval = null;
      }
    }
    
    // Auto-advance toggle
    const autoToggle = document.getElementById('auto-advance');
    autoToggle.addEventListener('change', function() {
      if (this.checked) {
        startAutoAdvance();
      } else {
        stopAutoAdvance();
      }
    });
    
    // Keyboard navigation
    document.addEventListener('keydown', function(event) {
      if (event.key === 'ArrowRight') {
        nextSlide();
      } else if (event.key === 'ArrowLeft') {
        prevSlide();
      }
    });
    
    // Start auto-advance by default
    startAutoAdvance();
  </script>
</body>
</html>
