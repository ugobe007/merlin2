<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merlin Wizard - Partner Preview</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      color: #e5e5e5;
      overflow: hidden;
    }
    
    .header {
      position: absolute;
      top: 3rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 100;
    }
    
    .header h1 {
      font-size: 2.5rem;
      color: #3ecf8e;
      margin-bottom: 0.5rem;
      font-weight: 700;
    }
    
    .header p {
      color: #888;
      font-size: 1.1rem;
    }
    
    /* Slide Container */
    .slide-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 140px 80px 180px;
    }
    
    /* Slide Content */
    .slide {
      display: none;
      width: 100%;
      max-width: 1400px;
      height: 100%;
      animation: fadeIn 0.5s ease-in-out;
    }
    
    .slide.active {
      display: block;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Mockup Frame */
    .mockup-frame {
      width: 100%;
      height: 100%;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5), 0 0 80px rgba(62, 207, 142, 0.15);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    /* Mockup Header (browser chrome) */
    .mockup-header {
      background: #f0f0f0;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #ddd;
    }
    
    .mockup-dots {
      display: flex;
      gap: 8px;
    }
    
    .mockup-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    
    .mockup-dot.red { background: #ff5f57; }
    .mockup-dot.yellow { background: #ffbd2e; }
    .mockup-dot.green { background: #28c840; }
    
    .mockup-url {
      flex: 1;
      background: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      color: #666;
      text-align: center;
    }
    
    /* Mockup Content */
    .mockup-content {
      flex: 1;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
    }
    
    /* Slide-specific styling */
    .slide-1 .mockup-content {
      flex-direction: column;
      gap: 40px;
    }
    
    .hero-section {
      text-align: center;
      max-width: 800px;
    }
    
    .hero-section h2 {
      font-size: 3rem;
      color: #fff;
      margin-bottom: 1rem;
      font-weight: 700;
    }
    
    .hero-section .highlight {
      color: #3ecf8e;
    }
    
    .hero-section p {
      font-size: 1.3rem;
      color: #888;
      line-height: 1.6;
    }
    
    .cta-button {
      display: inline-block;
      background: linear-gradient(135deg, #3ecf8e 0%, #2ea872 100%);
      color: #fff;
      padding: 16px 40px;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: 600;
      text-decoration: none;
      margin-top: 30px;
      box-shadow: 0 10px 30px rgba(62, 207, 142, 0.3);
      transition: transform 0.2s;
    }
    
    .cta-button:hover {
      transform: translateY(-2px);
    }
    
    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      width: 100%;
      max-width: 1000px;
    }
    
    .feature-card {
      background: #151515;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }
    
    .feature-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }
    
    .feature-card h3 {
      font-size: 1.1rem;
      color: #fff;
      margin-bottom: 8px;
    }
    
    .feature-card p {
      font-size: 0.9rem;
      color: #888;
      line-height: 1.5;
    }
    
    /* Wizard Preview (Slides 2 & 3) */
    .wizard-preview {
      width: 100%;
      max-width: 900px;
      background: #0f0f0f;
      border: 2px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px;
    }
    
    .wizard-step {
      margin-bottom: 30px;
      text-align: center;
    }
    
    .step-badge {
      display: inline-block;
      background: #3ecf8e;
      color: #0a0a0a;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 20px;
    }
    
    .wizard-step h2 {
      font-size: 2rem;
      color: #fff;
      margin-bottom: 16px;
    }
    
    .wizard-step p {
      font-size: 1.1rem;
      color: #888;
      margin-bottom: 30px;
    }
    
    .input-group {
      background: #1a1a1a;
      border: 2px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .input-icon {
      font-size: 1.5rem;
    }
    
    .input-group input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }
    
    .input-group input::placeholder {
      color: #555;
    }
    
    .wizard-button {
      width: 100%;
      background: #3ecf8e;
      color: #0a0a0a;
      padding: 16px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    
    .results-panel {
      background: linear-gradient(135deg, #1a2a1a 0%, #0f1f0f 100%);
      border: 2px solid #3ecf8e;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
    }
    
    .savings-amount {
      font-size: 4rem;
      color: #3ecf8e;
      font-weight: 700;
      margin: 20px 0;
    }
    
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 30px;
    }
    
    .metric-box {
      background: rgba(62, 207, 142, 0.1);
      border: 1px solid rgba(62, 207, 142, 0.3);
      border-radius: 12px;
      padding: 20px;
    }
    
    .metric-label {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 8px;
    }
    
    .metric-value {
      font-size: 1.8rem;
      color: #3ecf8e;
      font-weight: 700;
    }
    
    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.2rem;
      }
      
      .carousel-nav {
        width: 50px;
        height: 50px;
        font-size: 20px;
      }
      
      .carousel-nav.prev {
        left: 1rem;
      }
      
      .carousel-nav.next {
        right: 1rem;
      }
      
      .carousel-info {
        max-width: 90%;
        padding: 1rem;
      }
      
      .carousel-counter,
      .auto-toggle {
        top: 80px;
        font-size: 0.8rem;
        padding: 0.4rem 0.8rem;
      }
      
      .thumbnail {
        width: 80px;
        height: 60px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧙‍♂️ Merlin Wizard Screenshots</h1>
    <p>Complete wizard flow from location entry to quote generation</p>
  </div>
  
  <!-- Carousel Container -->
  <div class="carousel-container">
    <!-- Counter -->
    <div class="carousel-counter">
      <span id="current-slide">1</span> / <span id="total-slides">4</span>
    </div>
    
    <!-- Auto-advance Toggle -->
    <div class="auto-toggle">
      <input type="checkbox" id="auto-advance" checked>
      <label for="auto-advance">Auto-advance (5s)</label>
    </div>
    
    <!-- Main Image Display -->
    <div class="carousel-main">
      <div class="carousel-nav prev" onclick="prevSlide()">‹</div>
      <img id="carousel-image" class="carousel-image" src="01-widget-demo-page.png" alt="Screenshot">
      <div class="carousel-nav next" onclick="nextSlide()">›</div>
    </div>
    
    <!-- Info Panel -->
    <div class="carousel-info" id="carousel-info">
      <span class="step-badge">LANDING PAGE</span>
      <h3>Widget Demo Page</h3>
      <p>Complete widget demo landing page with live calculator toggle, integration code snippets (iframe + REST API), and pricing tiers.</p>
    </div>
    
    <!-- Thumbnail Strip -->
    <div class="thumbnail-strip" id="thumbnail-strip">
      <img src="01-widget-demo-page.png" class="thumbnail active" onclick="goToSlide(0)" alt="Slide 1">
      <img src="02-wizard-step0-mode-selection.png" class="thumbnail" onclick="goToSlide(1)" alt="Slide 2">
      <img src="03-wizard-step1-location.png" class="thumbnail" onclick="goToSlide(2)" alt="Slide 3">
      <img src="04-wizard-step1-business-name.png" class="thumbnail" onclick="goToSlide(3)" alt="Slide 4">
    </div>
  </div>
  
  <script>
    const slides = [
      {
        image: '01-widget-demo-page.png',
        badge: 'LANDING PAGE',
        title: 'Widget Demo Page',
        description: 'Complete widget demo landing page with live calculator toggle, integration code snippets (iframe + REST API), and pricing tiers.'
      },
      {
        image: '02-wizard-step0-mode-selection.png',
        badge: 'STEP 0',
        title: 'Mode Selection',
        description: 'Choose between Guided Wizard (Free • AI-Powered), ProQuote™ (Advanced • Custom), or Upload Quote (Review • Enhance).'
      },
      {
        image: '03-wizard-step1-location.png',
        badge: 'STEP 1',
        title: 'Location Entry',
        description: 'ZIP code or country name input with US/International toggle. Merlin advisor explains utility rate lookup and solar scoring.'
      },
      {
        image: '04-wizard-step1-business-name.png',
        badge: 'STEP 1B',
        title: 'Business Matching',
        description: 'Optional business name input with auto-detection or skip to manual industry selection. Location confirmed with Edit option.'
      }
    ];
    
    let currentSlide = 0;
    let autoAdvanceInterval = null;
    
    function updateCarousel() {
      const slide = slides[currentSlide];
      
      // Update image
      document.getElementById('carousel-image').src = slide.image;
      
      // Update info
      const info = document.getElementById('carousel-info');
      info.innerHTML = `
        <span class="step-badge">${slide.badge}</span>
        <h3>${slide.title}</h3>
        <p>${slide.description}</p>
      `;
      
      // Update counter
      document.getElementById('current-slide').textContent = currentSlide + 1;
      document.getElementById('total-slides').textContent = slides.length;
      
      // Update thumbnails
      const thumbnails = document.querySelectorAll('.thumbnail');
      thumbnails.forEach((thumb, index) => {
        thumb.classList.toggle('active', index === currentSlide);
      });
    }
    
    function nextSlide() {
      currentSlide = (currentSlide + 1) % slides.length;
      updateCarousel();
    }
    
    function prevSlide() {
      currentSlide = (currentSlide - 1 + slides.length) % slides.length;
      updateCarousel();
    }
    
    function goToSlide(index) {
      currentSlide = index;
      updateCarousel();
    }
    
    // Auto-advance functionality
    function startAutoAdvance() {
      autoAdvanceInterval = setInterval(nextSlide, 5000);
    }
    
    function stopAutoAdvance() {
      if (autoAdvanceInterval) {
        clearInterval(autoAdvanceInterval);
        autoAdvanceInterval = null;
      }
    }
    
    // Auto-advance toggle
    const autoToggle = document.getElementById('auto-advance');
    autoToggle.addEventListener('change', function() {
      if (this.checked) {
        startAutoAdvance();
      } else {
        stopAutoAdvance();
      }
    });
    
    // Keyboard navigation
    document.addEventListener('keydown', function(event) {
      if (event.key === 'ArrowRight') {
        nextSlide();
      } else if (event.key === 'ArrowLeft') {
        prevSlide();
      }
    });
    
    // Start auto-advance by default
    startAutoAdvance();
  </script>
</body>
</html>
