<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="goldG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE8A3"/>
      <stop offset="45%" stop-color="#F2C14F"/>
      <stop offset="100%" stop-color="#B8892F"/>
    </linearGradient>
    <linearGradient id="bgG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1a3a"/>
      <stop offset="100%" stop-color="#040b18"/>
    </linearGradient>
    <linearGradient id="emG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3ECF8E"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="emGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="6" y="6" width="88" height="88" rx="22" fill="url(#bgG)" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>

  <!-- Emerald top-bar terminal nub -->
  <rect x="36" y="12" width="28" height="8" rx="4" fill="url(#emG)" filter="url(#emGlow)"/>

  <!-- Stylized T — large, bold gold -->
  <!-- T horizontal bar -->
  <rect x="16" y="38" width="30" height="8" rx="4" fill="url(#goldG)" filter="url(#glow)"/>
  <!-- T vertical stem -->
  <rect x="27" y="38" width="8" height="32" rx="4" fill="url(#goldG)"/>

  <!-- Stylized Q — circle ring + tail -->
  <circle cx="68" cy="57" r="17" fill="none" stroke="url(#goldG)" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Q tail -->
  <line x1="79" y1="68" x2="89" y2="80" stroke="url(#goldG)" stroke-width="7" stroke-linecap="round"/>

  <!-- Subtle indigo inner border glow on the outer rect -->
  <rect x="6" y="6" width="88" height="88" rx="22" fill="none" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
</svg>
