<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 44" fill="none">
  <defs>
    <!-- Gold metallic gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFE8A3"/>
      <stop offset="40%"  stop-color="#F2C14F"/>
      <stop offset="100%" stop-color="#C8962A"/>
    </linearGradient>
    <!-- Shield fill: dark semi-transparent -->
    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1e2f5e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a1428" stop-opacity="0.9"/>
    </linearGradient>
    <!-- Subtle glow on shield -->
    <filter id="shieldGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ─── Shield icon ─────────────────────────────── -->
  <!-- Shield body: classic upward-curved top, pointed bottom -->
  <path
    d="M22 4 C22 4 31 7 31 7 L31 19 C31 26 22 31 22 31 C22 31 13 26 13 19 L13 7 Z"
    fill="url(#shieldFill)"
    stroke="url(#gold)"
    stroke-width="1.6"
    stroke-linejoin="round"
    filter="url(#shieldGlow)"
  />
  <!-- Checkmark inside shield -->
  <polyline
    points="17,18 20.5,22 27,14"
    fill="none"
    stroke="url(#gold)"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- ─── Wordmark ──────────────────────────────────── -->
  <!-- "True" — crisp white -->
  <text
    x="38"
    y="27"
    font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif"
    font-size="22"
    font-weight="800"
    letter-spacing="-0.6"
    fill="#FFFFFF"
  >True</text>

  <!-- "Quote" — gold -->
  <text
    x="91"
    y="27"
    font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif"
    font-size="22"
    font-weight="800"
    letter-spacing="-0.6"
    fill="url(#gold)"
  >Quote</text>

  <!-- ™ — gold superscript -->
  <text
    x="192"
    y="17"
    font-family="'Plus Jakarta Sans', system-ui, sans-serif"
    font-size="9"
    font-weight="700"
    fill="#F2C14F"
  >™</text>

  <!-- ─── Tagline rule ──────────────────────────────── -->
  <!-- Thin gold separator line -->
  <line x1="38" y1="34" x2="202" y2="34" stroke="#F2C14F" stroke-width="0.8" stroke-opacity="0.35"/>
  <!-- Tagline text -->
  <text
    x="38"
    y="42"
    font-family="'Manrope', 'Inter', system-ui, sans-serif"
    font-size="7.5"
    font-weight="600"
    letter-spacing="1.4"
    fill="#94A3B8"
  >VERIFIED ENERGY QUOTES</text>
</svg>
