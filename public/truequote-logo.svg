<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <defs>
    <!-- Gold gradient for the TQ mark -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE8A3"/>
      <stop offset="45%" stop-color="#F2C14F"/>
      <stop offset="100%" stop-color="#B8892F"/>
    </linearGradient>
    <!-- Deep navy bg for the mark -->
    <linearGradient id="markBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1a3a"/>
      <stop offset="100%" stop-color="#060d1f"/>
    </linearGradient>
    <!-- Emerald accent -->
    <linearGradient id="emeraldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3ECF8E"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <!-- Soft glow filter -->
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ══════════════════════════════════════════ -->
  <!-- ICON MARK: rounded square, 40×40, centered at x=20 -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="4" y="4" width="40" height="40" rx="10" fill="url(#markBg)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Inner emerald top-bar (terminal nub style) -->
  <rect x="16" y="7" width="16" height="4" rx="2" fill="url(#emeraldGrad)" filter="url(#subtleGlow)"/>

  <!-- TQ letterform — bold, gold -->
  <!-- T -->
  <rect x="10" y="17" width="14" height="3" rx="1.5" fill="url(#goldGrad)" filter="url(#goldGlow)"/>
  <rect x="16" y="17" width="3" height="16" rx="1.5" fill="url(#goldGrad)"/>
  <!-- Q -->
  <circle cx="31" cy="27" r="7" fill="none" stroke="url(#goldGrad)" stroke-width="2.8" filter="url(#goldGlow)"/>
  <!-- Q tail -->
  <line x1="35.5" y1="31.5" x2="39" y2="35" stroke="url(#goldGrad)" stroke-width="2.8" stroke-linecap="round"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- WORDMARK -->
  <!-- ══════════════════════════════════════════ -->
  <!-- "TrueQuote" — white, tight tracking -->
  <text
    x="52"
    y="30"
    font-family="'Plus Jakarta Sans', 'Manrope', system-ui, sans-serif"
    font-size="20"
    font-weight="800"
    letter-spacing="-0.5"
    fill="#FFFFFF"
  >TrueQuote</text>

  <!-- ™ superscript -->
  <text
    x="165"
    y="22"
    font-family="'Plus Jakarta Sans', system-ui, sans-serif"
    font-size="9"
    font-weight="600"
    fill="#F2C14F"
  >™</text>

  <!-- Tagline — gold dot + "Verified Energy Quotes" -->
  <circle cx="56" cy="39" r="2.5" fill="url(#goldGrad)" filter="url(#goldGlow)"/>
  <text
    x="63"
    y="42"
    font-family="'Manrope', system-ui, sans-serif"
    font-size="9"
    font-weight="600"
    letter-spacing="0.8"
    fill="#94A3B8"
  >VERIFIED ENERGY QUOTES</text>
</svg>
