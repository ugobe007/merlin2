<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFE8A3"/>
      <stop offset="40%"  stop-color="#F2C14F"/>
      <stop offset="100%" stop-color="#C8962A"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0e1a3a"/>
      <stop offset="100%" stop-color="#040b18"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1e3060" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0a1428" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Shield body — large, centered -->
  <path
    d="M50 10 C50 10 80 20 80 20 L80 55 C80 74 50 88 50 88 C50 88 20 74 20 55 L20 20 Z"
    fill="url(#shieldFill)"
    stroke="url(#gold)"
    stroke-width="3.5"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Checkmark — bold, centered in shield -->
  <polyline
    points="33,52 43,64 67,38"
    fill="none"
    stroke="url(#gold)"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Subtle indigo outer border -->
  <rect width="100" height="100" rx="20" fill="none" stroke="rgba(99,102,241,0.3)" stroke-width="2"/>
</svg>
