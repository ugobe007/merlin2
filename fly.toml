# fly.toml app configuration file for Merlin BESS Quote Builder
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# IMPORTANT: This must match your Fly.io app name
# Current app: merlin2 (main production app)
# Alternative apps: merlin (old), merlin-bess-quote-builder (testing)

app = 'merlin2'
primary_region = 'lax'

[build]
  dockerfile = "Dockerfile"

  # NOTE: [build.secrets] is intentionally omitted.
  # Depot (Fly's remote builder) does NOT forward fly app secrets to BuildKit
  # via the [build.secrets] TOML mechanism. Build secrets must be passed
  # explicitly via --build-secret CLI flags at deploy time.
  #
  # Use:  npm run deploy          (sources from .env, adds CACHEBUST)
  #   or: bash scripts/deploy.sh  (same thing, directly)

# Runtime environment — available to the Express server (port 3001) at run time.
# Sensitive keys (GOOGLE_MAPS_API_KEY, STRIPE_SECRET_KEY, etc.) are managed via
# `fly secrets set` and are injected automatically as env vars — no need to list
# them here.
[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
