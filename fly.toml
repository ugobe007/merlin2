    # Third-party API Keys (public, client-side)
    VITE_GOOGLE_MAPS_API_KEY = "AIzaSyAYGUXKEd7qh4P5ItCvjB-KqznvOcsQtAY"
    VITE_NREL_API_KEY = "G9sYxfv89Vr9mjHD5zThWpBntyYkKJjP6iF8i3He"
