# fly.toml app configuration file for Merlin BESS Quote Builder
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# IMPORTANT: This must match your Fly.io app name
# Current app: merlin2 (main production app)
# Alternative apps: merlin (old), merlin-bess-quote-builder (testing)

app = 'merlin2'
primary_region = 'lax'

[build]
  dockerfile = "Dockerfile"

  # VITE_ build secrets are passed via --build-secret flags in the CI/CD
  # workflow (fly-deploy.yml) and via scripts/deploy.sh locally.
  # Do NOT add [build.secrets] here — duplicate secret names between
  # fly.toml and --build-secret CLI flags cause a conflict in flyctl ≥ 0.4.

# Runtime environment — available to the Express server (port 3001) at run time.
# Sensitive keys (GOOGLE_MAPS_API_KEY, STRIPE_SECRET_KEY, etc.) are managed via
# `fly secrets set` and are injected automatically as env vars — no need to list
# them here.
[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
