# fly.toml app configuration file for Merlin BESS Quote Builder
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# IMPORTANT: This must match your Fly.io app name
# Current app: merlin2 (main production app)
# Alternative apps: merlin (old), merlin-bess-quote-builder (testing)

app = 'merlin2'
primary_region = 'lax'

[build]
  dockerfile = "Dockerfile"

  # Maps Fly app secrets (stored via `fly secrets set`) to Docker BuildKit
  # secret IDs for the remote builder. This is the correct mechanism for
  # --remote-only builds. Do NOT duplicate these via --build-secret CLI flags.
  [build.secrets]
    VITE_SUPABASE_URL            = "VITE_SUPABASE_URL"
    VITE_SUPABASE_ANON_KEY       = "VITE_SUPABASE_ANON_KEY"
    VITE_RESEND_API_KEY          = "VITE_RESEND_API_KEY"
    VITE_OPENAI_API_KEY          = "VITE_OPENAI_API_KEY"
    VITE_ENABLE_AI_ANALYSIS      = "VITE_ENABLE_AI_ANALYSIS"
    VITE_GOOGLE_MAPS_API_KEY     = "VITE_GOOGLE_MAPS_API_KEY"
    VITE_NREL_API_KEY            = "VITE_NREL_API_KEY"
    VITE_VISUAL_CROSSING_API_KEY = "VITE_VISUAL_CROSSING_API_KEY"

# Runtime environment — available to the Express server (port 3001) at run time.
# Sensitive keys (GOOGLE_MAPS_API_KEY, STRIPE_SECRET_KEY, etc.) are managed via
# `fly secrets set` and are injected automatically as env vars — no need to list
# them here.
[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
